[phases.setup]
nixPkgs = ["chromium", "nodejs_20"]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node -e \"const {execSync} = require('child_process'); try { console.log('Chromium path:', execSync('which chromium').toString()); } catch(e) { console.log('which failed, trying find...'); }\" && node server.js"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
